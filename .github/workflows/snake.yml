name: Generate Animation

on:
  # Berjalan otomatis setiap 12 jam
  schedule:
    - cron: "0 */12 * * *" 
  
  # Mengizinkan Anda menjalankan animasi ini secara manual kapan saja
  workflow_dispatch:
  
  # Berjalan setiap kali Anda melakukan push ke branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Membuat animasi ular berdasarkan kontribusi akun alifandiya
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: alifandiya
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Mengunggah hasil gambar ke branch khusus bernama 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
